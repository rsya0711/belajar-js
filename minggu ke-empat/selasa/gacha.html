<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gacha Simulator</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Gacha Gacorr</h1>
      <h2>Main disini di jamin WD</h2>
    </div>

    <div class="content">
      <aside class="sidebar">
        <div id="stats"></div>
        <div class="button-group">
          <button id="pullBtn">Pull x1</button>
          <button id="pullTenBtn">Pull x10</button>
          <button id="resetBtn">Reset</button>
        </div>
      </aside>

      <main>
        <h2 style="margin-bottom: 15px; color: #333;">Hasil Pull</h2>
        <div id="results"></div>
      </main>
    </div>
  </div>

  <script type="module" src="js/src/main.js"></script>
</body>
</html>
